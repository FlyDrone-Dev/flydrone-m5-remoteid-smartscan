; M5StickC Plus2 (ESP32-PICO-V3-02) build configuration

[env:m5stick-c-plus2]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

; --- M5StickC Plus2 は ESP32-PICO-V3-02 (8MB Flash) ---
; board=m5stick-c のデフォルトは 4MB 定義のため、以下で上書きする
board_build.partitions  = default_8MB.csv   ; app0/app1 各 3MB、OTA 対応
board_upload.flash_size = 8MB
board_upload.maximum_size = 3145728         ; app0 パーティション上限 3MB

lib_deps =
    m5stack/M5StickCPlus2@^1.0.0

build_flags =
    -DARDUINO_M5STICK_C_PLUS2
    -DCORE_DEBUG_LEVEL=0

; main.cpp / main_cores3.cpp / main_stampc3.cpp が同一src/内に共存するため、
; 環境ごとに他のmainを除外してビルド対象を切り替える
build_src_filter = +<*> -<main_cores3.cpp> -<main_stampc3.cpp>

; --- CoreS3-SE 移植 事前コンパイル確認用（仮設定・実機未確認） ---
; NOTE: PlatformIOにCoreS3-SE専用board定義は無いため、
;       無印CoreS3用の m5stack-cores3 を仮に流用している。
[env:cores3-se]
platform = espressif32
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
upload_speed = 1500000

; --- CoreS3/CoreS3-SE は ESP32-S3, 16MB Flash 想定 ---
board_build.partitions  = default_16MB.csv
board_upload.flash_size = 16MB

lib_deps =
    m5stack/M5Unified@^0.1.17
    m5stack/M5GFX@^0.1.16

build_flags =
    -DARDUINO_M5STACK_CORES3
    -DCORE_DEBUG_LEVEL=0

build_src_filter = +<*> -<main.cpp> -<main_stampc3.cpp>

; --- M5Stamp C3 移植（仮設定・実機未確認） ---
; NOTE: PlatformIOにM5Stamp C3専用board定義は無いため、
;       汎用の esp32-c3-devkitm-1 (ESP32-C3, 4MB) を仮に流用している。
;       M5Stamp C3 は LCD/ボタン/バッテリIC 非搭載・RGB LED(SK6812)搭載のため、
;       表示は Adafruit_NeoPixel によるLED制御(GPIO2)へ、操作は内蔵ボタン(GPIO3)
;       長押しによるリセットへ置き換えている（src/main_stampc3.cpp）。
[env:stampc3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

; M5Stamp C3 は 4MB Flash。デフォルトのapp partition(1.25MB)では
; BLE+WiFiスタックを含むと超過するため、min_spiffs(app 1.9MB×OTA2)を指定。
board_build.partitions = min_spiffs.csv

lib_deps =
    adafruit/Adafruit NeoPixel@^1.12.0

build_flags =
    -DCORE_DEBUG_LEVEL=0

; stampc3 は main_stampc3.cpp のみをビルド対象にし、
; 既存の main.cpp / main_cores3.cpp は除外する。
build_src_filter = +<*> -<main.cpp> -<main_cores3.cpp>
